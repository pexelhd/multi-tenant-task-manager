databases:
  - name: task-manager-db
    databaseName: task_manager
    user: taskadmin
    plan: free

services:
  # ── Backend API (Node, free tier) ──────────────────────────────
  - type: web
    name: task-manager-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_HOST
        fromDatabase:
          name: task-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: task-manager-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: task-manager-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: KEYCLOAK_URL
        sync: false
      - key: KEYCLOAK_REALM
        value: task-manager
      - key: KEYCLOAK_CLIENT_ID
        value: task-manager-app
      - key: KEYCLOAK_CLIENT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # ── Frontend (Static Site, free) ───────────────────────────────
  - type: web
    name: task-manager-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_KEYCLOAK_URL
        sync: false
      - key: VITE_KEYCLOAK_REALM
        value: task-manager
      - key: VITE_KEYCLOAK_CLIENT_ID
        value: task-manager-app
