databases:
  - name: task-manager-db
    databaseName: task_manager
    user: taskadmin
    plan: free

  - name: keycloak-db
    databaseName: keycloak
    user: keycloak
    plan: free

services:
  # ── Backend API ────────────────────────────────────────────────
  - type: web
    name: task-manager-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_HOST
        fromDatabase:
          name: task-manager-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: task-manager-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: task-manager-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password
      - key: KEYCLOAK_URL
        sync: false          # set manually after Keycloak is deployed
      - key: KEYCLOAK_REALM
        value: task-manager
      - key: KEYCLOAK_CLIENT_ID
        value: task-manager-app
      - key: KEYCLOAK_CLIENT_SECRET
        sync: false          # set manually from Keycloak admin console
      - key: GROQ_API_KEY
        sync: false          # set manually

  # ── Keycloak ──────────────────────────────────────────────────
  - type: web
    name: task-manager-keycloak
    runtime: image
    image:
      url: quay.io/keycloak/keycloak:24.0
    plan: free
    healthCheckPath: /health/ready
    dockerCommand: start
    envVars:
      - key: KEYCLOAK_ADMIN
        value: admin
      - key: KEYCLOAK_ADMIN_PASSWORD
        sync: false          # set a strong password manually
      - key: KC_DB
        value: postgres
      - key: KC_DB_URL
        fromDatabase:
          name: keycloak-db
          property: connectionString
      - key: KC_HOSTNAME_STRICT
        value: false
      - key: KC_PROXY
        value: edge
      - key: KC_HTTP_ENABLED
        value: true

  # ── Frontend (Static Site) ─────────────────────────────────────
  - type: web
    name: task-manager-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # set to https://task-manager-backend.onrender.com/api
      - key: VITE_KEYCLOAK_URL
        sync: false          # set to https://task-manager-keycloak.onrender.com
      - key: VITE_KEYCLOAK_REALM
        value: task-manager
      - key: VITE_KEYCLOAK_CLIENT_ID
        value: task-manager-app
